<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; padding: 20px; font-family: -apple-system, sans-serif; background: #18181b; color: #fff; text-align: center; }
    h3 { margin: 0 0 10px 0; color: #a855f7; }
    .btn { width: 100%; padding: 12px; background: #a855f7; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; }
    .btn:hover { background: #9333ea; }
    .btn:disabled { background: #3f3f46; cursor: not-allowed; color: #888; }
    .hidden { display: none; }
    #status { font-size: 13px; color: #a1a1aa; }
  </style>
</head>
<body>
  <h3>ScrapeMind OS ⚡</h3>
  <div id="status">Detecting YouTube Playlist...</div>
  <button id="btn-launch" class="btn hidden" disabled>Launch Workspace</button>
  <script src="popup.js"></script>
</body>
</html>
